name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e ".[test]"

      - name: Run tests with coverage
        run: python -m pytest --cov --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e ".[lint]"

      - name: Run ruff format
        run: ruff format --check src/ai_vuln_harness/ tests/

      - name: Run prospector (ruff check + mypy + pylint)
        run: prospector --with-tool ruff --with-tool mypy --with-tool pylint src/ai_vuln_harness/

      - name: Run semgrep
        run: semgrep --config=auto --severity=ERROR src/ai_vuln_harness/

      - name: Run vulture (dead code detection)
        run: vulture --min-confidence 90 src/ai_vuln_harness/ --exclude src/ai_vuln_harness/.vulture_whitelist.py

  benchmark-regression-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect benchmark-relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            benchmark:
              - 'src/ai_vuln_harness/prompts/**'
              - 'src/ai_vuln_harness/stages/**'
              - 'src/ai_vuln_harness/run.py'
              - 'src/ai_vuln_harness/config/defaults.json'
              - 'src/ai_vuln_harness/config/stages.json'
              - 'src/ai_vuln_harness/config/benchmark_*.json'

      - name: Set up Python
        if: steps.changes.outputs.benchmark == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        if: steps.changes.outputs.benchmark == 'true'
        uses: astral-sh/setup-uv@v5

      - name: Install benchmark dependencies
        if: steps.changes.outputs.benchmark == 'true'
        run: uv pip install --system -e ".[test]"

      - name: Run benchmark regression gate
        if: steps.changes.outputs.benchmark == 'true'
        run: |
          python -m ai_vuln_harness.run \
            --mode benchmark \
            --repo "${{ github.workspace }}" \
            --skip-health \
            --benchmark-corpus src/ai_vuln_harness/config/benchmark_corpus.json \
            --benchmark-baseline src/ai_vuln_harness/config/benchmark_baselines.json \
            --benchmark-thresholds src/ai_vuln_harness/config/benchmark_thresholds.json \
            --benchmark-output output/benchmark_regression_report.json

      - name: Skip benchmark regression gate
        if: steps.changes.outputs.benchmark != 'true'
        run: echo "No prompts/stage/validation-policy changes detected; benchmark gate skipped."

      - name: Upload benchmark regression artifact
        if: steps.changes.outputs.benchmark == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-regression-report
          path: output/benchmark_regression_report.json
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Check package
        run: pip install twine && python -m twine check dist/*
