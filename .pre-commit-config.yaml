repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.9.0
  hooks:
  - id: ruff-format

- repo: https://github.com/jendrikseipp/vulture
  rev: v2.16
  hooks:
  - id: vulture
    args: ["--min-confidence", "90", "src/ai_vuln_harness/stages", "src/ai_vuln_harness/run.py", "--exclude", "src/ai_vuln_harness/.vulture_whitelist.py"]
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
- repo: local
  hooks:
  - id: mdformat
    name: mdformat (markdown formatting)
    entry: mdformat --check README.md
    language: system
    pass_filenames: false
    stages:
      - pre-commit
      - manual
  - id: prospector
    name: prospector (ruff check + mypy)
    entry: bash -c 'prospector --with-tool ruff --with-tool mypy --with-tool pylint src/ai_vuln_harness/'
    language: system
    pass_filenames: false
    stages:
      - pre-commit
      - manual
  - id: semgrep
    name: semgrep
    entry: bash -c 'semgrep --config=auto --severity=ERROR src/ai_vuln_harness/'
    language: system
    pass_filenames: false
    stages:
      - pre-commit
      - manual
  - id: lizard
    name: lizard - Code Complexity Check
    entry: bash -c 'lizard src/ai_vuln_harness/ --languages python --CCN 15 -w'
    language: system
    pass_filenames: false
    stages:
      - pre-commit
      - manual
  - id: pytest
    name: pytest
    language: system
    entry: bash -c 'python -m pytest tests/ -q'
    pass_filenames: false
    stages:
      - pre-commit
      - manual
  - id: impactguard-check
    name: ImpactGuard - Full Pipeline Check
    entry: impactguard-check-staged
    language: system
    files: \.py$
    stages:
      - pre-commit
  - id: impactguard-post-commit
    name: ImpactGuard - Post-Commit Analysis
    entry: impactguard-post-commit-hook
    language: system
    always_run: true
    stages:
      - post-commit
  - id: build-check
    name: Build package before push
    entry: uv run python -m build
    language: system
    stages:
      - pre-push
